name: TAIS CI

on:
  push:
    branches: [main, "phase*"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run unit tests
        run: |
          PYTHONPATH=. python -m unittest discover -s tests -v
      - name: Import-check experiments
        run: |
          PYTHONPATH=. python -c "import experiments.statistical_replication, experiments.cross_domain_transfer, experiments.ablation_runner"
      - name: Smoke-run ablation (5 seeds, 3+3 ticks)
        run: |
          mkdir -p results
          PYTHONPATH=. python experiments/ablation_runner.py --seeds 5 --pretrain 3 --eval 3 --output results/ci_smoke.txt
