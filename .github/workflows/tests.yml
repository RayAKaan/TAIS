name: TAIS CI

on:
  push:
    branches: [main, "phase*"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint with ruff
        run: |
          python -m pip install ruff
          ruff check --output-format=github --exit-zero .
      - name: Run unit tests (pytest)
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Import-check experiments
        run: |
          python -c "
import tais_core.experiments.runners.statistical_replication
import tais_core.experiments.runners.cross_domain_transfer
import tais_core.experiments.runners.ablation_runner
"
      - name: Smoke-run ablation (5 seeds, 3+3 ticks)
        run: |
          mkdir -p results
          python -m tais_core.experiments.runners.ablation_runner --seeds 5 --pretrain 3 --eval 3 --output results/ci_smoke.txt
